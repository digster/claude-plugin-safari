<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cache Explorer — Claude Assistant</title>
  <link rel="stylesheet" href="cache-explorer.css">
</head>
<body>
  <!-- Sidebar: scrollable list of cached URLs -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Cached Results <span id="count-badge" class="count-badge">0</span></h2>
      <div class="sidebar-actions">
        <button id="export-all-btn" class="sidebar-btn" title="Export All as Zip">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
            <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
          </svg>
        </button>
        <button id="refresh-btn" class="sidebar-btn" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/>
            <path fill-rule="evenodd" d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5.002 5.002 0 0 0 8 3zM3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9H3.1z"/>
          </svg>
        </button>
        <button id="clear-all-btn" class="sidebar-btn danger" title="Clear All Cache">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
            <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H5.5l1-1h3l1 1h2a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="sidebar-list" class="sidebar-list">
      <div class="empty-state">Loading...</div>
    </div>
  </aside>

  <!-- Detail panel: shows selected cached result -->
  <main class="detail">
    <div id="detail-placeholder" class="detail-placeholder">
      <div class="placeholder-icon">
        <svg width="48" height="48" viewBox="0 0 16 16" fill="currentColor" opacity="0.2">
          <path d="M4 0h5.293A1 1 0 0 1 10 .293L13.707 4a1 1 0 0 1 .293.707V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2zm5.5 1.5v2a1 1 0 0 0 1 1h2l-3-3z"/>
        </svg>
      </div>
      <p>Select a cached result to view its details</p>
    </div>

    <div id="detail-content" class="detail-content hidden">
      <!-- URL and metadata header -->
      <div class="detail-header">
        <div class="detail-url" id="detail-url"></div>
        <div class="detail-prompt" id="detail-prompt"></div>
        <div class="detail-meta" id="detail-meta"></div>
      </div>

      <!-- Action buttons -->
      <div class="detail-actions">
        <button id="detail-copy-btn" class="action-btn">Copy</button>
        <button id="detail-export-btn" class="action-btn">Export</button>
        <button id="detail-delete-btn" class="action-btn danger">Delete</button>
      </div>

      <!-- Rendered markdown content -->
      <div class="result-content" id="detail-result"></div>
    </div>
  </main>

  <script src="../lib/jszip.min.js"></script>
  <script src="cache-explorer.js"></script>
</body>
</html>
